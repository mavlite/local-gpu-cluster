# RAG corpus sources for AnythingLLM workspaces.
#
# Single source of truth for what gets ingested. Edit this file to add,
# disable, or reconfigure a source, then run:
#
#   scripts/rag/refresh.py --source <id> --dry-run    # preview
#   scripts/rag/refresh.py --source <id>              # apply
#   scripts/rag/refresh.py                            # honor refresh_interval
#   scripts/rag/refresh.py --force                    # all sources regardless of interval
#
# Sources are keyed by `id`. Each must declare a `handler` matching one of
# scripts/rag/handlers/<name>.py. Disabled sources are skipped entirely.
#
# Refresh intervals use suffixes: 30d, 12h, 90m. The orchestrator skips a
# source unless `(now - last_success) >= refresh_interval` or --force is set.
#
# ── handler reference ──────────────────────────────────────────────────────
#   github_repo      Clone a git repo, walk files matching file_glob, compute
#                    a citation URL per file, ingest as raw text. Best for
#                    sources where the vendor publishes docs as text in git.
#
#   sphinx_sitemap   Fetch sitemap.xml (with fallback to scraping per-section
#                    index pages), filter URLs, trafilatura-extract each one,
#                    ingest as raw text. Best for hosted Sphinx sites.
#
#   hugo_sitemap     STUB (Phase 2). Like sphinx_sitemap but tuned for Hugo's
#                    sitemap shape + Last-Modified header use.
#
#   rss              STUB (Phase 2). Periodically poll an RSS feed for new
#                    entries, trafilatura-extract each post URL.
#
#   url_list_hashed  STUB (Phase 2). Hand-curated URL list; refresh checks
#                    content hash of each URL and re-ingests on change.

sources:

  # ── Official: TrueNAS middleware API reference ──────────────────────────
  # The Sphinx-rendered API methods/objects/events index served by iXsystems.
  # Used to verify midclt call signatures and response shapes.
  # NOTE: doc_prefix matches what the original recover-long-urls.sh ingest
  # used. If you want to track multiple API versions side-by-side later,
  # change this to include the version (e.g. " v27.0") AFTER the existing
  # docs are migrated — otherwise the prefix-match fallback in
  # migrate_backfill.py handles the drift.
  - id: truenas-api-v27
    handler: sphinx_sitemap
    enabled: true
    workspace: sdg-documentation
    doc_prefix: "[OFFICIAL] api.truenas.com"
    refresh_interval: 30d
    config:
      sitemap_url: https://api.truenas.com/v27.0/sitemap.xml
      base_url: https://api.truenas.com/v27.0
      fallback_index_pages:
        - api_methods.html
        - api_objects.html
        - api_events.html
      include_patterns:
        - "api_methods_"
        - "api_objects_"
        - "api_events_"
        - "examples"
        - "using_"
        - "/index.html$"
      exclude_patterns: []

  # ── Official: OPNsense user documentation ───────────────────────────────
  - id: opnsense-docs
    handler: github_repo
    enabled: true
    workspace: sdg-documentation
    doc_prefix: "[OFFICIAL] opnsense/docs"
    refresh_interval: 7d
    config:
      repo: https://github.com/opnsense/docs
      file_glob: "*.rst"
      path_strip: "source/"
      rendered_base: https://docs.opnsense.org
      url_ext_from: ".rst"
      url_ext_to: ".html"

  # ── Official: Keycloak documentation ────────────────────────────────────
  # Many topic .adoc files compile to a single HTML guide page,
  # so url_keep_depth=1 collapses them to the guide URL.
  #
  # file_exclude_regex carries the section-level "topics/" partials too:
  # Keycloak's structure is docs/documentation/<section>/topics/*.adoc
  # (e.g. docs/documentation/server_admin/topics/login.adoc) which
  # asciidoc includes into the main guide; ingesting them separately just
  # duplicates content into the same collapsed URL.
  - id: keycloak-docs
    handler: github_repo
    enabled: true
    workspace: sdg-documentation
    doc_prefix: "[OFFICIAL] keycloak/docs"
    refresh_interval: 7d
    config:
      repo: https://github.com/keycloak/keycloak
      file_glob: "*.adoc"
      path_strip: "docs/documentation/"
      rendered_base: https://www.keycloak.org/docs/latest
      url_ext_from: ".adoc"
      url_ext_to: "/"
      url_keep_depth: 1
      file_exclude_regex: '^docs/(guides|maven-plugin|documentation/(dist|header-maven-plugin|internal_resources|tests|aggregation|(?:[^/]+/)?topics))/'

  # ── Official: TrueNAS Scale user docs (Hugo) ────────────────────────────
  # NOTE: verify repo path against your actual ingest history; some operators
  # use a private mirror. The Hugo build lowercases paths.
  - id: truenas-scale-docs
    handler: github_repo
    enabled: true
    workspace: sdg-documentation
    doc_prefix: "[OFFICIAL] truenas/documentation"
    refresh_interval: 7d
    config:
      repo: https://github.com/truenas/documentation
      file_glob: "*.md"
      path_strip: "content/"
      rendered_base: https://www.truenas.com/docs
      url_ext_from: ".md"
      url_ext_to: "/"
      url_lowercase: true

  # ── Official: TrueNAS blog (parked — no public feed exists) ─────────────
  # Originally split out of truenas-scale-docs via
  # scripts/rag/split_truenas_blog.py (migrate_backfill prefix-matched
  # /blog/ URLs into the docs source by mistake). 595 historical entries
  # remain in /tank/rag-state/truenas-blog/documents.json with hash=
  # "migrated", still searchable through the sdg-documentation workspace.
  #
  # 2026-05-25 verification: TrueNAS / iXsystems publish no public RSS,
  # Atom, or accessible sitemap for blog content. Probed:
  #     /blog/feed/                404
  #     /blog/index.xml            404
  #     /feed, /rss, /atom.xml etc 301 → SPA fallback (no real feed)
  #     /sitemap.xml               301 → SPA fallback
  #     /robots.txt                lists 3 sitemaps (main / community /
  #                                docs), main one redirects same as above;
  #                                community is the forum; docs is already
  #                                ingested via truenas-scale-docs handler.
  # The rss handler itself (scripts/rag/handlers/rss.py) and the
  # removal_policy=additive_only support in plan.py/refresh.py are shipped
  # and usable for any future source that DOES have a feed — likely
  # candidates: homenetworkguy.com, klarasystems.com, ServeTheHome, Phase
  # Two, etc. Just add a new entry below with handler: rss + the same
  # removal_policy: additive_only field.
  #
  # For *new* TrueNAS blog content, the cluster's server-side tool
  # execution route (see day-2-ops.md § 6.8) supports live web search via
  # tavily_search — bypassing the need for RAG-indexed up-to-the-minute
  # blog content. RAG retains the historical corpus; Tavily handles fresh.
  - id: truenas-blog
    handler: rss
    enabled: false   # no working feed found — see comment above
    removal_policy: additive_only
    workspace: sdg-documentation
    doc_prefix: "[OFFICIAL] truenas/blog"
    refresh_interval: 7d
    config:
      rss_url: https://www.truenas.com/blog/feed/   # 404 as of 2026-05-25
      url_domain_filter: '^https?://www\.truenas\.com/blog/'
      max_entries: 50

  # ── Official: OpenZFS documentation ─────────────────────────────────────
  # Some directories contain spaces (e.g., "Basic Concepts/") which must be
  # URL-encoded in the citation URL.
  #
  # State-recovery procedure (one-time, run on PVE host) if documents.json
  # holds stale '/en/' URLs from a pre-refresh.py ingest pattern:
  #   rm /tank/rag-state/openzfs-docs/{documents,manifest}.json
  #   /opt/vcf-scraper-venv/bin/python scripts/rag/refresh.py \
  #     --source openzfs-docs --force
  #   /opt/vcf-scraper-venv/bin/python scripts/rag/cleanup_interrupted_refresh.py \
  #     --source openzfs-docs --apply
  # The cleanup helper treats the workspace's leftover /en/ docs as orphans
  # because the fresh state doesn't track them — same mechanism as the
  # interrupted-refresh recovery, repurposed for URL-shape migration.
  - id: openzfs-docs
    handler: github_repo
    enabled: true
    workspace: sdg-documentation
    doc_prefix: "[OFFICIAL] openzfs/openzfs-docs"
    refresh_interval: 14d
    config:
      repo: https://github.com/openzfs/openzfs-docs
      file_glob: "*.rst"
      path_strip: "docs/"
      rendered_base: https://openzfs.github.io/openzfs-docs
      url_ext_from: ".rst"
      url_ext_to: ".html"
      url_encode_spaces: true

# ── Global defaults ────────────────────────────────────────────────────────
defaults:
  # Halt a refresh that would delete more than this fraction of a source's
  # existing documents. Write the plan to _proposals/ for operator review.
  max_delete_pct: 0.10

  # Where per-source state files live. Survives ingest LXC re-creation if on
  # the ZFS pool.
  state_dir: /tank/rag-state

  # AnythingLLM API base URL. Token read from scripts/config.env (ALLM_API_KEY).
  allm_base_url: http://192.168.6.154:3001/api/v1

  # Polite delay between trafilatura HTTP fetches (per source).
  crawl_delay_seconds: 3

  # HTTP request timeout for sitemap / page fetches.
  request_timeout_seconds: 30

  # Embedding pass timeout. Big workspaces with thousands of new chunks need
  # a generous ceiling.
  embed_timeout_seconds: 1800
