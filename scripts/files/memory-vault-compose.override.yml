# Overrides for the upstream memory-vault docker-compose.yml.
# - Bind PGDATA onto the tank ZFS dataset (snapshot + backup coverage).
# - Replace the default DB password with a generated one (${MEMVAULT_DB_PASSWORD}
#   is substituted by docker compose from /opt/memory-vault/.env).
# - Do NOT publish Postgres on the host network; only the app container needs it
#   over the compose network. NOTE: docker compose MERGES list fields like `ports`
#   by APPENDING, so `ports: []` does NOT remove the base mapping — the `!reset`
#   tag (compose >= 2.24.4) is required to drop the inherited `5432:5432` publish.
services:
  db:
    # Must restart on reboot/daemon-restart too — without this, only `app`
    # (below) came back after a host reboot and looped "Database not reachable"
    # (incident 2026-06-19). Both services need the policy.
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${MEMVAULT_DB_PASSWORD}
    ports: !reset []
    volumes:
      - /opt/memory-vault-data/pgdata:/var/lib/postgresql/data
  app:
    image: ${MEMVAULT_IMAGE}
    environment:
      DB_PASSWORD: ${MEMVAULT_DB_PASSWORD}
      API_AUTH_ENABLED: "true"
      API_CORS_ORIGINS: "*"
    restart: unless-stopped
